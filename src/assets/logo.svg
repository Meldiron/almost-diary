  <line x1="96" y1="88" x2="96" y2="424" stroke="#e8967c" stroke-width="2" opacity="0.5"/>
  <line x1="112" y1="56" x2="112" y2="456" stroke="#e8ddd2" stroke-width="1.5" opacity="0.6"/>
