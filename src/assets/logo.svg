    <circle cx="168" cy="104" r="2"/><circle cx="200" cy="104" r="2"/><circle cx="232" cy="104" r="2"/><circle cx="264" cy="104" r="2"/><circle cx="296" cy="104" r="2"/><circle cx="328" cy="104" r="2"/><circle cx="360" cy="104" r="2"/><circle cx="392" cy="104" r="2"/>
    <circle cx="168" cy="136" r="2"/><circle cx="200" cy="136" r="2"/><circle cx="232" cy="136" r="2"/><circle cx="264" cy="136" r="2"/><circle cx="296" cy="136" r="2"/><circle cx="328" cy="136" r="2"/><circle cx="360" cy="136" r="2"/><circle cx="392" cy="136" r="2"/>
    <circle cx="168" cy="168" r="2"/><circle cx="200" cy="168" r="2"/><circle cx="232" cy="168" r="2"/><circle cx="264" cy="168" r="2"/><circle cx="296" cy="168" r="2"/><circle cx="328" cy="168" r="2"/><circle cx="360" cy="168" r="2"/><circle cx="392" cy="168" r="2"/>
    <circle cx="168" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="232" cy="200" r="2"/><circle cx="264" cy="200" r="2"/><circle cx="296" cy="200" r="2"/><circle cx="328" cy="200" r="2"/><circle cx="360" cy="200" r="2"/><circle cx="392" cy="200" r="2"/>
    <circle cx="168" cy="328" r="2"/><circle cx="200" cy="328" r="2"/><circle cx="232" cy="328" r="2"/><circle cx="264" cy="328" r="2"/><circle cx="296" cy="328" r="2"/><circle cx="328" cy="328" r="2"/><circle cx="360" cy="328" r="2"/><circle cx="392" cy="328" r="2"/>
    <circle cx="168" cy="360" r="2"/><circle cx="200" cy="360" r="2"/><circle cx="232" cy="360" r="2"/><circle cx="264" cy="360" r="2"/><circle cx="296" cy="360" r="2"/><circle cx="328" cy="360" r="2"/><circle cx="360" cy="360" r="2"/><circle cx="392" cy="360" r="2"/>
    <circle cx="168" cy="392" r="2"/><circle cx="200" cy="392" r="2"/><circle cx="232" cy="392" r="2"/><circle cx="264" cy="392" r="2"/><circle cx="296" cy="392" r="2"/><circle cx="328" cy="392" r="2"/><circle cx="360" cy="392" r="2"/><circle cx="392" cy="392" r="2"/>
    <circle cx="168" cy="424" r="2"/><circle cx="200" cy="424" r="2"/><circle cx="232" cy="424" r="2"/><circle cx="264" cy="424" r="2"/><circle cx="296" cy="424" r="2"/><circle cx="328" cy="424" r="2"/><circle cx="360" cy="424" r="2"/><circle cx="392" cy="424" r="2"/>
