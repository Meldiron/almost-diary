<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe7"/>
      <stop offset="100%" stop-color="#e8ddd2"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8967c"/>
      <stop offset="100%" stop-color="#e07a5c"/>
    </linearGradient>
  </defs>
  <!-- Book body -->
  <rect x="80" y="56" width="352" height="400" rx="24" fill="url(#cover)" stroke="#f0b8a4" stroke-width="8"/>
  <!-- Spine -->
